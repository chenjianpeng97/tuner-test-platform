name: UAT BDD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  app-api-uat:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: fastapi-clean-example
        run: uv sync --locked --group dev

      - name: Run workspace UAT feature checks
        run: pnpm nx run ux-uat:check-features

      - name: Start database and run migrations
        env:
          APP_ENV: ci
        run: pnpm nx run app-api:bootstrap-ci

      - name: Start FastAPI service
        env:
          APP_ENV: ci
        run: |
          pnpm nx run app-api:serve-ci > /tmp/app-api-uat.log 2>&1 &
          echo $! > /tmp/app-api-uat.pid

      - name: Wait for health endpoint
        run: |
          timeout 30s bash -s <<'BASH'
          until curl -sf http://127.0.0.1:8000/api/v1/health > /tmp/app-api-health.json; do
            sleep 1
          done
          cat /tmp/app-api-health.json
          BASH

      - name: Validate Behave dry-run wiring
        env:
          APP_ENV: ci
        run: pnpm nx run app-api:test-uat-dry-run

      - name: Run HTTP UAT suite
        env:
          APP_ENV: ci
        run: pnpm nx run app-api:test-uat

      - name: Upload UAT JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-api-uat-junit
          path: dist/test-results/app-api/uat/
          if-no-files-found: error

      - name: Print backend log on failure
        if: failure()
        run: |
          if [[ -f /tmp/app-api-uat.log ]]; then
            cat /tmp/app-api-uat.log
          fi

      - name: Stop FastAPI service
        if: always()
        run: |
          if [[ -f /tmp/app-api-uat.pid ]]; then
            kill $(cat /tmp/app-api-uat.pid) 2>/dev/null || true
          fi
          # Kill child processes (uv run / uvicorn) that the parent kill misses,
          # so they don't hold the uv cache lock during post-job cleanup.
          pkill -f "python src/app/run.py" 2>/dev/null || true
          pkill -f "uvicorn" 2>/dev/null || true
          sleep 1